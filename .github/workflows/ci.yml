name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions for security
permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          # First install will fail but identify packages needing approval
          pnpm install --frozen-lockfile || true
          # Now approve all pending builds
          pnpm approve-builds --all || true
          # Install again with approvals
          pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Build project
        run: pnpm run build
        env:
          # Skip telemetry during CI
          NEXT_TELEMETRY_DISABLED: 1
